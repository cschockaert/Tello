name: Release APK

on:
  push:
    tags:
      - "v*"
    # Also allow cutting a release from a branch push whose commit message
    # contains the marker "[release]" (the runner's GITHUB_TOKEN creates the
    # tag + release server-side, which works even when tag pushes are blocked).
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version name for the release (e.g. v1.0)"
        required: true
        default: "v1.0"

permissions:
  contents: write

env:
  # Tag from the pushed tag / dispatch input, else default to v1.0.
  RELEASE_TAG: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v1.0' }}

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run for tag pushes, manual dispatch, or a "[release]"-marked commit.
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage APK with a release name
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release-assets/TelloPilot-${RELEASE_TAG}-debug.apk"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: "TelloPilot ${{ env.RELEASE_TAG }}"
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          body: |
            APK debug **sideloadable** de TelloPilot (pas de signature release — voir README).

            > ⚠️ Aucune validation hardware possible en sandbox : pilotage, liaison UDP,
            > décodage vidéo et écriture des médias sont à confirmer au premier vol réel
            > (voir la checklist du README).
          files: release-assets/*.apk
