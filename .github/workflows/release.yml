name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage APK with a release name
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release-assets/TelloPilot-${GITHUB_REF_NAME}-debug.apk"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: "TelloPilot ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            APK debug **sideloadable** de TelloPilot (pas de signature release — voir README).

            > ⚠️ Aucune validation hardware possible en sandbox : pilotage, liaison UDP,
            > décodage vidéo et écriture des médias sont à confirmer au premier vol réel
            > (voir la checklist du README).
          files: release-assets/*.apk
